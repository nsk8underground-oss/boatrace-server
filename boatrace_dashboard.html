<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ボートレース予想</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --bg:#07101d;--bg2:#0d1825;--bg3:#121f30;
  --border:rgba(0,180,255,0.15);--border2:rgba(0,180,255,0.32);
  --accent:#00b4ff;--accent2:#00ffcc;--gold:#f5c518;--red:#ff4060;
  --orange:#ff8c30;--purple:#a875ff;--text:#c8e0ff;--muted:#4e6a88;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --hdr:52px;--nav:56px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
button,input,select{touch-action:manipulation;font-family:var(--sans);}

/* ── HEADER ── */
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:200;padding-top:env(safe-area-inset-top,0);}
.venue-btn{display:flex;align-items:center;gap:8px;background:rgba(0,180,255,0.1);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;cursor:pointer;}
.venue-name{font-size:15px;font-weight:700;}
.venue-type-badge{font-size:9px;font-family:var(--mono);padding:2px 6px;border-radius:8px;font-weight:700;}
.vt-sea{background:rgba(0,180,255,0.15);color:var(--accent);border:1px solid rgba(0,180,255,0.3);}
.vt-fresh{background:rgba(0,255,204,0.12);color:var(--accent2);border:1px solid rgba(0,255,204,0.25);}
.vt-brackish{background:rgba(255,140,48,0.15);color:var(--orange);border:1px solid rgba(255,140,48,0.28);}
.chevron{font-size:10px;color:var(--muted);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.clock{font-family:var(--mono);font-size:13px;color:var(--accent);}
.srv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.srv-dot.ok{background:var(--accent2);box-shadow:0 0 5px var(--accent2);}
.srv-dot.err{background:var(--red);}
.srv-dot.checking{background:var(--muted);}
.fetch-btn{background:rgba(0,255,204,0.1);border:1px solid var(--accent2);color:var(--accent2);font-size:12px;font-weight:700;padding:6px 11px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.fetch-btn:active{opacity:0.6;}
.fetch-btn:disabled{opacity:0.35;cursor:not-allowed;}
.spin{display:inline-block;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── VENUE PICKER ── */
#venuePicker{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:500;display:none;flex-direction:column;}
#venuePicker.open{display:flex;}
.vp-hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;padding-top:calc(14px + env(safe-area-inset-top,0));}
.vp-title{font-size:16px;font-weight:700;}
.vp-close{background:none;border:1px solid var(--border2);color:var(--muted);font-size:13px;padding:5px 12px;border-radius:4px;cursor:pointer;}
.vp-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(16px + var(--safe-b));}
.vp-region{padding:12px 14px 4px;font-size:10px;color:var(--muted);letter-spacing:0.2em;font-family:var(--mono);}
.vp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 4px;}
.vp-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;}
.vp-card:active{opacity:0.7;}
.vp-card.active{border-color:var(--accent);background:rgba(0,180,255,0.1);}
.vp-card.racing{border-color:var(--accent2);}
.vc-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.vc-meta{font-size:10px;color:var(--muted);}
.vc-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.vc-racing{font-size:9px;background:rgba(0,255,204,0.15);color:var(--accent2);border:1px solid rgba(0,255,204,0.3);padding:1px 6px;border-radius:8px;font-family:var(--mono);font-weight:700;}
.vc-grade{font-size:9px;background:rgba(245,193,24,0.15);color:var(--gold);border:1px solid rgba(245,193,24,0.3);padding:1px 6px;border-radius:8px;font-family:var(--mono);font-weight:700;}

/* ── CONTENT + NAV ── */
#content{position:fixed;top:var(--hdr);left:0;right:0;bottom:calc(var(--nav) + var(--safe-b));overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
.page.active{display:block;}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe-b));background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--safe-b);}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 4px;color:var(--muted);}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:19px;line-height:1;}
.nav-lbl{font-size:9px;letter-spacing:0.05em;}

/* ── COMMON ── */
.sec{font-size:10px;color:var(--muted);letter-spacing:0.2em;font-family:var(--mono);padding:12px 14px 6px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.state-box{margin:16px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px 18px;text-align:center;}
.state-box.err{border-color:rgba(255,64,96,0.3);}
.state-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.state-sub{font-size:12px;color:var(--muted);line-height:1.7;}

/* ── DATE BAR ── */
.date-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 0;}
.date-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 10px;border-radius:5px;outline:none;flex:1;}
.date-input:focus{border-color:var(--accent);}
.go-btn{background:rgba(0,180,255,0.15);border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:700;padding:7px 14px;border-radius:5px;cursor:pointer;white-space:nowrap;}

/* ── VENUE INFO CARD ── */
.venue-info-card{margin:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.vi-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.vi-name{font-size:17px;font-weight:700;}
.vi-region{font-size:10px;color:var(--muted);font-family:var(--mono);}
.vi-note{font-size:12px;color:var(--text);line-height:1.6;}
.vi-badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.vi-badge{font-size:10px;font-family:var(--mono);font-weight:700;padding:2px 8px;border-radius:8px;}

/* ── RACE CHIPS ── */
.race-scroll{display:flex;gap:8px;padding:8px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.race-scroll::-webkit-scrollbar{display:none;}
.race-chip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;text-align:center;min-width:60px;}
.race-chip.active{background:rgba(0,180,255,0.15);border-color:var(--accent);}
.chip-num{font-family:var(--mono);font-size:13px;font-weight:700;}
.chip-time{font-size:10px;color:var(--muted);font-family:var(--mono);}

/* ── COND ── */
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 14px;}
.cond-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.cond-lbl{font-size:9px;color:var(--muted);letter-spacing:0.12em;font-family:var(--mono);margin-bottom:3px;}
.cond-val{font-size:14px;font-weight:500;}
.cond-val.live{color:var(--accent2);}
.cond-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 5px;border-radius:4px;width:100%;margin-top:2px;-webkit-appearance:none;outline:none;}

/* ── ADVICE ── */
.adv-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;padding:12px 14px;}
.adv-title{font-size:11px;font-family:var(--mono);font-weight:700;margin-bottom:8px;}
.adv-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
.adv-badge{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.ab-g{background:rgba(0,255,204,0.12);color:var(--accent2);border:1px solid rgba(0,255,204,0.25);}
.ab-r{background:rgba(255,64,96,0.12);color:var(--red);border:1px solid rgba(255,64,96,0.25);}
.ab-y{background:rgba(245,193,24,0.12);color:var(--gold);border:1px solid rgba(245,193,24,0.25);}
.ab-m{background:rgba(78,106,136,0.15);color:var(--muted);border:1px solid rgba(78,106,136,0.25);}
.adv-text{font-size:12px;line-height:1.5;color:var(--text);}

/* ── DEMEME ── */
.dememe-scroll{display:flex;gap:8px;padding:4px 14px 8px;overflow-x:auto;scrollbar-width:none;}
.dememe-scroll::-webkit-scrollbar{display:none;}
.dc{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-width:88px;}
.dc.hot{border-color:rgba(245,193,24,0.4);}
.d-circles{display:flex;align-items:center;gap:2px;margin-bottom:3px;}
.d-dot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;}
.d-sep{font-size:9px;color:var(--muted);}
.d-rate{font-size:10px;color:var(--muted);font-family:var(--mono);}
.d-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-top:4px;}
.d-fill{height:100%;border-radius:1px;}

/* ── ENTRY ── */
.entry-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;overflow:hidden;}
.entry-card.fixed{border-color:var(--gold);}
.entry-top{display:flex;align-items:stretch;}
.lane-col{display:flex;align-items:center;justify-content:center;width:44px;font-size:22px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.l1{background:#fff;color:#111;}.l2{background:#2020ff;color:#fff;}.l3{background:#cc0000;color:#fff;}.l4{background:#555;color:#fff;}.l5{background:#aa8800;color:#fff;}.l6{background:#006000;color:#fff;}
.entry-main{flex:1;padding:10px 10px 8px;min-width:0;}
.entry-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.entry-name{font-size:15px;font-weight:700;}
.ecls{font-size:11px;font-family:var(--mono);font-weight:700;}
.cls-A1{color:var(--gold);}.cls-A2{color:#aaa;}.cls-B1{color:#7ad;}.cls-B2{color:var(--muted);}
.sm-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.sm{text-align:center;}
.sm-l{font-size:9px;color:var(--muted);font-family:var(--mono);}
.sm-v{font-size:12px;font-weight:500;font-family:var(--mono);}
.sm-hi{color:var(--accent2);}.sm-md{color:var(--accent);}.sm-lo{color:var(--muted);}
.sm-div{width:1px;height:22px;background:var(--border);}
.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.prob-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
.prob-track{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.prob-fill{height:100%;border-radius:3px;}
.prob-pct{font-size:12px;font-weight:700;font-family:var(--mono);min-width:34px;text-align:right;}
.odds-col{padding:10px 10px 10px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--border);flex-shrink:0;}
.odds-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);}
.odds-lbl{font-size:9px;color:var(--muted);}
.entry-bot{border-top:1px solid var(--border);background:rgba(0,0,0,0.2);padding:7px 10px;}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.mg-btns{display:flex;gap:4px;}
.mg-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:700;width:32px;height:28px;border-radius:4px;cursor:pointer;}
.mg-S.on{background:rgba(255,64,96,0.2);border-color:var(--red);color:var(--red);}
.mg-A.on{background:rgba(245,193,24,0.2);border-color:var(--gold);color:var(--gold);}
.mg-B.on{background:rgba(0,180,255,0.2);border-color:var(--accent);color:var(--accent);}
.mg-C.on{background:rgba(0,255,204,0.15);border-color:var(--accent2);color:var(--accent2);}
.mg-D.on{background:rgba(78,106,136,0.2);border-color:var(--muted);color:var(--muted);}
.fix1-btn{margin-left:auto;background:none;border:1px solid var(--border2);color:var(--muted);font-size:10px;font-family:var(--mono);font-weight:700;padding:4px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;}
.fix1-btn.on{background:rgba(245,193,24,0.15);border-color:var(--gold);color:var(--gold);}
.ex-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:5px;}
.ex-grp{display:flex;align-items:center;gap:5px;}
.ex-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.ex-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 7px;border-radius:4px;width:100%;outline:none;min-width:0;}
.ex-input:focus{border-color:var(--accent2);}
.ex-input::placeholder{color:var(--muted);font-size:11px;}
.note-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:4px;width:100%;outline:none;}
.note-inp:focus{border-color:var(--accent2);}
.note-inp::placeholder{color:var(--muted);}

/* ── STATS ── */
.stats-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;overflow:hidden;}
.stats-hdr{display:flex;align-items:center;}
.s-lane{display:flex;align-items:center;justify-content:center;width:44px;font-size:20px;font-weight:700;font-family:var(--mono);padding:12px 0;flex-shrink:0;}
.s-title{flex:1;padding:10px 12px;}
.s-name{font-size:15px;font-weight:700;}
.s-sub{font-size:11px;color:var(--muted);}
.stats-body{padding:10px 14px;border-top:1px solid var(--border);}
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.s-box{background:var(--bg3);border-radius:6px;padding:8px 6px;text-align:center;}
.s-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;line-height:1.3;}
.s-val{font-size:15px;font-weight:700;font-family:var(--mono);}
.rate-bars{display:grid;gap:5px;}
.rate-row{display:flex;align-items:center;gap:8px;}
.rate-lbl{font-size:11px;color:var(--muted);width:78px;flex-shrink:0;}
.rate-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.rate-fill{height:100%;border-radius:3px;}
.rate-pct{font-size:11px;font-weight:700;font-family:var(--mono);width:36px;text-align:right;}
.ex-disp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ex-d-box{background:var(--bg3);border-radius:6px;padding:8px;text-align:center;}
.ex-d-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.ex-d-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent2);}
.ex-d-val.none{color:var(--muted);font-size:13px;}

/* ── PREDICT ── */
.fixed-bar{margin:8px 14px;border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(245,193,24,0.3);background:rgba(245,193,24,0.08);}
.fixed-bar.none{border-color:var(--border);background:rgba(0,180,255,0.05);}
.pb-main{display:block;width:calc(100% - 28px);margin:0 14px 10px;background:rgba(0,180,255,0.15);border:1px solid var(--accent);color:var(--accent);font-size:14px;font-weight:700;padding:13px;border-radius:8px;cursor:pointer;text-align:center;}
.pb-main:active{background:rgba(0,180,255,0.25);}
.pb-main:disabled{opacity:0.4;cursor:not-allowed;}
.ai-box{background:var(--bg2);border:1px solid rgba(0,255,204,0.2);border-radius:10px;margin:0 14px 8px;padding:14px;}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-badge{width:24px;height:24px;border:1px solid var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent2);font-family:var(--mono);font-weight:bold;flex-shrink:0;}
.ai-lbl{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:0.12em;font-family:var(--mono);}
.ai-text{font-size:12px;line-height:1.85;color:var(--text);}
.ai-text.loading{color:var(--muted);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.pred-scroll{display:flex;gap:8px;padding:0 14px 8px;overflow-x:auto;scrollbar-width:none;}
.pred-scroll::-webkit-scrollbar{display:none;}
.pred-chip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;min-width:110px;}
.pred-chip.main{border-color:rgba(245,193,24,0.5);}
.pc-type{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:4px;}
.pc-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--gold);}
.pc-note{font-size:10px;color:var(--muted);margin-top:2px;}
.eff-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 8px;}
.eff-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.eff-icon{font-size:15px;margin-bottom:3px;}
.eff-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.eff-text{font-size:11px;line-height:1.5;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,180,255,0.25);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,200,140,0.92);color:#041a10;font-size:12px;font-weight:700;padding:7px 16px;border-radius:20px;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;font-family:var(--mono);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <button class="venue-btn" onclick="openPicker()">
    <div>
      <div class="venue-name" id="hdrVenueName">場を選択</div>
      <div style="font-size:10px;color:var(--muted);font-family:var(--mono)" id="hdrVenueSub">▼ タップして変更</div>
    </div>
    <span class="venue-type-badge vt-sea" id="hdrVenueType">海水</span>
    <span class="chevron">▼</span>
  </button>
  <div class="hdr-r">
    <span class="srv-dot checking" id="srvDot"></span>
    <div class="clock" id="clock"></div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchAllData()">
      <span>↻</span> 取得
    </button>
  </div>
</header>

<!-- VENUE PICKER -->
<div id="venuePicker">
  <div class="vp-hdr">
    <div class="vp-title">競艇場を選択</div>
    <button class="vp-close" onclick="closePicker()">閉じる</button>
  </div>
  <div class="vp-scroll" id="venuePickerBody"></div>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- PAGE: RACE -->
  <div class="page active" id="page-race">
    <div class="date-bar">
      <input type="date" class="date-input" id="dateInput">
      <button class="go-btn" onclick="fetchAllData()">取得</button>
    </div>
    <div id="venueInfoBox"></div>
    <div class="sec">本日のレース</div>
    <div class="race-scroll" id="raceScroll"></div>
    <div id="raceStateBox"></div>
    <div class="sec">コンディション設定</div>
    <div class="cond-grid">
      <div class="cond-box"><div class="cond-lbl">天候</div><div class="cond-val live" id="condSky">—</div></div>
      <div class="cond-box">
        <div class="cond-lbl">風向</div>
        <select class="cond-sel" id="windDir" onchange="updateAdvice();savePrefs()">
          <option value="追い風">▶ 追い風</option>
          <option value="向かい風" selected>◀ 向かい風</option>
          <option value="横風">↕ 横風</option>
          <option value="無風">○ 無風</option>
        </select>
      </div>
      <div class="cond-box"><div class="cond-lbl">風速</div><div class="cond-val live" id="condWind">—</div></div>
      <div class="cond-box">
        <div class="cond-lbl">潮位</div>
        <select class="cond-sel" id="tideType" onchange="updateAdvice();savePrefs()">
          <option value="満潮">満潮</option>
          <option value="干潮" selected>干潮</option>
          <option value="上げ潮">上げ潮</option>
          <option value="下げ潮">下げ潮</option>
        </select>
      </div>
      <div class="cond-box"><div class="cond-lbl">水温</div><div class="cond-val live" id="condWater">—</div></div>
      <div class="cond-box"><div class="cond-lbl">波高</div><div class="cond-val live" id="condWave">—</div></div>
    </div>
    <div class="sec">風況アドバイス</div>
    <div class="adv-card"><div class="adv-title" id="windAdvTitle"></div><div id="windAdvBody"></div></div>
    <div class="sec">潮位アドバイス</div>
    <div class="adv-card"><div class="adv-title" id="tideAdvTitle"></div><div id="tideAdvBody"></div></div>
    <div class="sec" id="dememeTitle">出目リスト</div>
    <div class="dememe-scroll" id="dememe1"></div>
  </div>

  <!-- PAGE: ENTRY -->
  <div class="page" id="page-entry">
    <div class="sec">出走表 <span style="color:var(--accent2);font-size:9px">— boatrace.jp リアルタイム</span></div>
    <div id="entryList"></div>
  </div>

  <!-- PAGE: STATS -->
  <div class="page" id="page-stats">
    <div class="sec">選手詳細 <span style="color:var(--accent2);font-size:9px">— 勝率・成績・展示</span></div>
    <div id="statsList"></div>
  </div>

  <!-- PAGE: PREDICT -->
  <div class="page" id="page-predict">
    <div class="sec">AI予想</div>
    <div class="fixed-bar none" id="fixedBar">
      <span id="fixedTxt" style="font-size:13px;font-weight:500">1着固定：未設定（出走表で設定）</span>
    </div>
    <button class="pb-main" id="predictBtn" onclick="runPredict()">⚡ AI予想を生成</button>
    <div class="ai-box" id="aiBox" style="display:none">
      <div class="ai-hdr"><div class="ai-badge">AI</div><div class="ai-lbl">PREDICTION ENGINE</div></div>
      <div class="ai-text" id="aiText"></div>
    </div>
    <div id="predCards" style="display:none">
      <div class="sec">予想結果</div>
      <div class="pred-scroll" id="predScroll"></div>
      <div class="eff-cards" id="effCards"></div>
    </div>
    <div class="sec">出目リスト参照</div>
    <div class="dememe-scroll" id="dememe2"></div>
    <div style="height:8px"></div>
  </div>

</div>

<nav id="nav">
  <button class="nav-btn active" onclick="showPage('race',this)"><span class="nav-icon">🏁</span><span class="nav-lbl">レース</span></button>
  <button class="nav-btn" onclick="showPage('entry',this)"><span class="nav-icon">📋</span><span class="nav-lbl">出走表</span></button>
  <button class="nav-btn" onclick="showPage('stats',this)"><span class="nav-icon">📊</span><span class="nav-lbl">選手詳細</span></button>
  <button class="nav-btn" onclick="showPage('predict',this)"><span class="nav-icon">⚡</span><span class="nav-lbl">予想</span></button>
</nav>
<div id="toast"></div>

<script>
/* ======================== VENUE DATA ======================== */
const VENUES = {
  '01':{ name:'桐生',   region:'関東', type:'fresh',   typeLabel:'淡水', note:'群馬県。淡水で水面穏やか。冬季は赤城おろしの強風に注意。イン有利が高い。',         color:'var(--accent2)' },
  '02':{ name:'戸田',   region:'関東', type:'fresh',   typeLabel:'淡水', note:'埼玉県。淡水・ナイター開催。荒川の水を使用。水面比較的穏やか。',                 color:'var(--accent2)' },
  '03':{ name:'江戸川', region:'関東', type:'brackish', typeLabel:'汽水', note:'東京都。全国唯一の河川コース。潮流の影響が大きくアウト有利になりやすい難水面。', color:'var(--orange)'  },
  '04':{ name:'平和島', region:'関東', type:'sea',      typeLabel:'海水', note:'東京都大田区。海水。首都高沿い。風の影響を受けやすく荒れることも多い水面。',     color:'var(--accent)'  },
  '05':{ name:'多摩川', region:'関東', type:'fresh',   typeLabel:'淡水', note:'東京都。淡水。水面非常に穏やか。全国屈指のイン有利競艇場。堅い決着が多い。',     color:'var(--accent2)' },

  '07':{ name:'蒲郡',   region:'東海', type:'sea',      typeLabel:'海水', note:'愛知県。三河湾。波が立ちやすい。ナイター開催。風の向きで展開が大きく変わる。', color:'var(--accent)'  },
  '08':{ name:'常滑',   region:'東海', type:'sea',      typeLabel:'海水', note:'愛知県。知多半島。ナイター開催。海水だが水面は比較的落ち着いている。',          color:'var(--accent)'  },
  '09':{ name:'津',     region:'東海', type:'sea',      typeLabel:'海水', note:'三重県。伊勢湾。うねりが入ることあり。ナイター開催。',                          color:'var(--accent)'  },
  '10':{ name:'三国',   region:'北陸', type:'sea',      typeLabel:'海水', note:'福井県。日本海側。冬季は荒天が多く波高が上がりやすい。荒れ展開に注意。',        color:'var(--accent)'  },
  '11':{ name:'びわこ', region:'近畿', type:'fresh',   typeLabel:'淡水', note:'滋賀県。琵琶湖。淡水で広大な水面。比叡おろしの強風が吹くと荒れる。',            color:'var(--accent2)' },
  '12':{ name:'住之江', region:'近畿', type:'fresh',   typeLabel:'淡水', note:'大阪府。淡水・ナイター。整備された水面でイン鉄板の競艇場として有名。',            color:'var(--accent2)' },
  '13':{ name:'尼崎',   region:'近畿', type:'sea',      typeLabel:'海水', note:'兵庫県。大阪湾の海水。水面比較的穏やか。',                                      color:'var(--accent)'  },
  '14':{ name:'鳴門',   region:'四国', type:'sea',      typeLabel:'海水', note:'徳島県。鳴門海峡近く。潮流の影響が大きい。満潮・干潮で展開が大きく変わる。',     color:'var(--accent)'  },
  '15':{ name:'丸亀',   region:'四国', type:'sea',      typeLabel:'海水', note:'香川県。瀬戸内海。穏やかな水面。イン有利傾向。',                                 color:'var(--accent)'  },
  '16':{ name:'児島',   region:'中国', type:'sea',      typeLabel:'海水', note:'岡山県。児島湖。汽水に近い水質。潮の影響あり。',                                 color:'var(--accent)'  },
  '17':{ name:'宮島',   region:'中国', type:'sea',      typeLabel:'海水', note:'広島県。瀬戸内海。潮流が強く満潮時は荒れやすい。SG開催も多い。',                 color:'var(--accent)'  },
  '18':{ name:'徳山',   region:'中国', type:'sea',      typeLabel:'海水', note:'山口県。徳山湾。水面比較的穏やか。イン有利の傾向。',                              color:'var(--accent)'  },
  '19':{ name:'下関',   region:'中国', type:'sea',      typeLabel:'海水', note:'山口県。関門海峡近く。潮流の影響が大きく難水面。アウト有利になりやすい。',        color:'var(--accent)'  },
  '20':{ name:'若松',   region:'九州', type:'sea',      typeLabel:'海水', note:'福岡県。洞海湾。工業地帯に囲まれた海面。穏やかで比較的イン有利。',              color:'var(--accent)'  },
  '21':{ name:'芦屋',   region:'九州', type:'sea',      typeLabel:'海水', note:'福岡県。玄界灘に面した海面コース。風・潮の影響が大きくアウト有利になりやすい。', color:'var(--accent)'  },
  '22':{ name:'福岡',   region:'九州', type:'sea',      typeLabel:'海水', note:'福岡県。博多湾。ナイター開催。水面は比較的穏やか。',                              color:'var(--accent)'  },
  '23':{ name:'唐津',   region:'九州', type:'sea',      typeLabel:'海水', note:'佐賀県。唐津湾。波が高くなりやすい外洋系水面。荒れ展開に注意。',                 color:'var(--accent)'  },
  '24':{ name:'大村',   region:'九州', type:'sea',      typeLabel:'海水', note:'長崎県。大村湾。内海で比較的穏やか。イン有利傾向。',                              color:'var(--accent)'  },
};

const REGIONS = ['関東','東海','北陸','近畿','四国','中国','九州'];

// 水面タイプ別の出目傾向
const DEMEME = {
  fresh: [ // 淡水（イン強め）
    {c:'1-2-3',r:9.1,hot:true},{c:'1-2-4',r:6.8,hot:true},{c:'1-3-2',r:5.5,hot:true},
    {c:'2-1-3',r:4.2},{c:'1-4-2',r:3.8},{c:'1-2-6',r:3.5},
    {c:'2-3-1',r:3.1},{c:'1-3-4',r:2.9},{c:'3-1-2',r:2.7},{c:'1-4-3',r:2.5},
  ],
  sea: [ // 海水（アウト有利）
    {c:'1-2-3',r:7.2,hot:true},{c:'1-3-2',r:6.5,hot:true},{c:'2-1-3',r:5.8,hot:true},
    {c:'1-2-4',r:5.0},{c:'3-1-2',r:4.6},{c:'2-3-1',r:4.1},
    {c:'1-4-2',r:3.7},{c:'3-2-1',r:3.3},{c:'4-1-2',r:3.0},{c:'2-4-1',r:2.8},
  ],
  brackish: [ // 汽水（中間）
    {c:'1-2-3',r:8.0,hot:true},{c:'1-3-2',r:6.0,hot:true},{c:'2-1-3',r:5.2,hot:true},
    {c:'1-2-4',r:5.0},{c:'2-3-1',r:4.3},{c:'3-1-2',r:4.0},
    {c:'1-4-2',r:3.6},{c:'1-3-4',r:3.2},{c:'3-2-1',r:2.9},{c:'2-4-1',r:2.7},
  ],
};

/* ======================== STATE ======================== */
const SERVER_URL = 'http://localhost:3000';
let currentVenueJcd = stor('br_lastVenue') || '04';
let currentRace = 1;
let fixedFirst  = null;
let raceData    = null;
let serverOk    = false;

/* ======================== STORAGE ======================== */
function stor(k, v) {
  try {
    if (v === undefined) return JSON.parse(localStorage.getItem(k));
    localStorage.setItem(k, JSON.stringify(v));
  } catch {}
  return null;
}
function vkey() { return `br_${currentVenueJcd}`; }
function loadMotor(lane) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  return stor(`${vkey()}_mg_${date}_l${lane}`) || { grade:'', note:'' };
}
function saveMotor(lane, grade, note) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  stor(`${vkey()}_mg_${date}_l${lane}`, { grade, note });
}
function loadExhibit(race, lane) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  return stor(`${vkey()}_ex_${date}_r${race}_l${lane}`) || { exhibitTime:'', st:'' };
}
function saveExhibit(race, lane, exhibitTime, st) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  stor(`${vkey()}_ex_${date}_r${race}_l${lane}`, { exhibitTime, st });
}
function savePrefs() {
  stor(`${vkey()}_prefs`, {
    wind: document.getElementById('windDir').value,
    tide: document.getElementById('tideType').value,
  });
}
function loadPrefs() {
  const p = stor(`${vkey()}_prefs`);
  if (!p) return;
  if (p.wind) document.getElementById('windDir').value = p.wind;
  if (p.tide) document.getElementById('tideType').value = p.tide;
}

/* ======================== VENUE PICKER ======================== */
function buildPickerBody() {
  const body = document.getElementById('venuePickerBody');
  const racing = stor('br_racingToday') || {};
  body.innerHTML = REGIONS.map(region => {
    const venues = Object.entries(VENUES).filter(([,v]) => v.region === region);
    const grid = venues.map(([jcd, v]) => {
      const isRacing = racing[jcd];
      const typeClass = v.type === 'fresh' ? 'vt-fresh' : v.type === 'brackish' ? 'vt-brackish' : 'vt-sea';
      return `<div class="vp-card${jcd === currentVenueJcd ? ' active' : ''}${isRacing ? ' racing' : ''}" onclick="selectVenue('${jcd}')">
        <div class="vc-name">${v.name}</div>
        <div class="vc-meta">${jcd} ｜ ${v.typeLabel}</div>
        <div class="vc-badges">
          <span class="venue-type-badge ${typeClass}">${v.typeLabel}</span>
          ${isRacing ? `<span class="vc-racing">開催中</span>` : ''}
          ${isRacing && isRacing !== true ? `<span class="vc-grade">${isRacing}</span>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div class="vp-region">${region}</div><div class="vp-grid">${grid}</div>`;
  }).join('');
}

function openPicker() {
  buildPickerBody();
  document.getElementById('venuePicker').classList.add('open');
}
function closePicker() {
  document.getElementById('venuePicker').classList.remove('open');
}
function selectVenue(jcd) {
  currentVenueJcd = jcd;
  stor('br_lastVenue', jcd);
  closePicker();
  updateVenueUI();
  loadPrefs();
  resetRaceData();
  buildVenueInfo();
  buildDememe('dememe1');
  buildDememe('dememe2');
  updateAdvice();
  buildEntryList([]);
  buildStatsList([]);
  updateFixedBar();
  document.getElementById('raceScroll').innerHTML = '';
  document.getElementById('raceStateBox').innerHTML = '';
}

function updateVenueUI() {
  const v = VENUES[currentVenueJcd];
  if (!v) return;
  document.getElementById('hdrVenueName').textContent = v.name;
  document.getElementById('hdrVenueSub').textContent = `${v.region} / 場コード ${currentVenueJcd}`;
  const badge = document.getElementById('hdrVenueType');
  badge.textContent = v.typeLabel;
  badge.className = 'venue-type-badge ' + (v.type === 'fresh' ? 'vt-fresh' : v.type === 'brackish' ? 'vt-brackish' : 'vt-sea');
  document.getElementById('dememeTitle').textContent = `${v.name} 出目リスト（${v.typeLabel}水面傾向）`;
  document.title = `${v.name} 予想`;
}

function buildVenueInfo() {
  const v = VENUES[currentVenueJcd];
  if (!v) return;
  const typeClass = v.type === 'fresh' ? 'vt-fresh' : v.type === 'brackish' ? 'vt-brackish' : 'vt-sea';
  document.getElementById('venueInfoBox').innerHTML = `
    <div class="venue-info-card">
      <div class="vi-top">
        <div>
          <div class="vi-name">ボートレース${v.name}</div>
          <div class="vi-region">${v.region}地区 ｜ 場コード ${currentVenueJcd}</div>
        </div>
        <span class="venue-type-badge ${typeClass}" style="font-size:11px;padding:3px 10px">${v.typeLabel}コース</span>
      </div>
      <div class="vi-note">${v.note}</div>
    </div>`;
}

function resetRaceData() {
  raceData = null;
  fixedFirst = null;
  currentRace = 1;
  document.getElementById('aiBox').style.display = 'none';
  document.getElementById('predCards').style.display = 'none';
  document.getElementById('condSky').textContent = '—';
  document.getElementById('condWind').textContent = '—';
  document.getElementById('condWater').textContent = '—';
  document.getElementById('condWave').textContent = '—';
}

/* ======================== SERVER CHECK ======================== */
async function checkServer() {
  const dot = document.getElementById('srvDot');
  try {
    const res = await fetch(`${SERVER_URL}/api/health`, { signal: AbortSignal.timeout(3000) });
    if (res.ok) {
      serverOk = true;
      dot.className = 'srv-dot ok';
      return true;
    }
  } catch {}
  serverOk = false;
  dot.className = 'srv-dot err';
  return false;
}

/* ======================== DATA FETCH ======================== */
async function fetchAllData() {
  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  if (!dateStr || dateStr.length !== 8) return alert('日付を選択してください');
  if (!currentVenueJcd) return alert('競艇場を選択してください');

  if (!serverOk) {
    const ok = await checkServer();
    if (!ok) { showServerError(); return; }
  }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span>';
  document.getElementById('raceStateBox').innerHTML = `<div class="state-box"><div class="state-sub" style="font-size:14px">↻ データ取得中...</div></div>`;

  try {
    const url = `${SERVER_URL}/api/all?jcd=${currentVenueJcd}&hd=${dateStr}&rno=${currentRace}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (!res.ok || data.error) {
      document.getElementById('raceStateBox').innerHTML = `
        <div class="state-box err">
          <div class="state-title" style="color:var(--red)">⚠ データなし</div>
          <div class="state-sub">${data.error || 'エラーが発生しました'}<br><br>
          ボートレース${VENUES[currentVenueJcd]?.name || ''}の開催日を確認してください。<br>
          <a href="https://www.boatrace.jp/owpc/pc/race/monthlyschedule" target="_blank" style="color:var(--accent)">開催スケジュールを確認 →</a></div>
        </div>`;
      return;
    }

    raceData = data;
    document.getElementById('raceStateBox').innerHTML = '';
    buildRaceChips(data.schedule);
    updateWeather(data.weather);
    buildEntryList(data.racers);
    buildStatsList(data.racers);
    updateAdvice();
    showToast(`✅ ${VENUES[currentVenueJcd]?.name} 第${currentRace}R 取得完了`);
  } catch (e) {
    document.getElementById('raceStateBox').innerHTML = `<div class="state-box err"><div class="state-title" style="color:var(--red)">通信エラー</div><div class="state-sub">${e.message}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>↻</span> 取得';
  }
}

async function fetchRace(rno) {
  if (!serverOk || !raceData) return;
  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  currentRace = rno;
  buildRaceChips(raceData.schedule);
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin">↻</span>';
  try {
    const res  = await fetch(`${SERVER_URL}/api/all?jcd=${currentVenueJcd}&hd=${dateStr}&rno=${rno}`);
    const data = await res.json();
    if (!res.ok || data.error) return;
    raceData = data;
    updateWeather(data.weather);
    buildEntryList(data.racers);
    buildStatsList(data.racers);
    fixedFirst = null;
    updateFixedBar();
  } catch {}
  finally {
    btn.disabled = false; btn.innerHTML = '<span>↻</span> 取得';
  }
}

function showServerError() {
  document.getElementById('raceStateBox').innerHTML = `
    <div class="state-box err">
      <div class="state-title" style="color:var(--red)">🔴 サーバー未起動</div>
      <div class="state-sub" style="text-align:left">
        PowerShellで以下を実行してください：<br><br>
        <code>cd C:\\boatrace</code><br>
        <code>node server.js</code><br><br>
        起動後に「取得」ボタンを押してください。
      </div>
    </div>`;
}

/* ======================== WEATHER ======================== */
function updateWeather(w) {
  if (!w) return;
  if (w.sky)   document.getElementById('condSky').textContent   = w.sky;
  if (w.wind != null) document.getElementById('condWind').textContent  = `${w.wind}m/s`;
  if (w.water != null) document.getElementById('condWater').textContent = `${w.water}℃`;
  if (w.wave  != null) document.getElementById('condWave').textContent  = `${w.wave}cm`;
}

/* ======================== ADVICE ======================== */
const windAdvice = {
  '追い風':{c:'var(--accent2)',l:'💨 追い風 — イン優勢',items:[
    {cls:'ab-g',b:'イン有利',t:'スタートから流れに乗れる1〜2号艇が有利。1号艇逃げ率が上昇。'},
    {cls:'ab-y',b:'差し有効',t:'2・3号艇の差しが決まりやすい展開に。内側からのまくり差しに注目。'},

    document.getElementById(tid).innerHTML = `<span style="color:${d.c}">${d.l}</span>`;

      `<div class="adv-item"><span class="adv-badge ${i.cls}">${i.b}</span><span class="adv-text">${i.t}</span></div>`

/* ======================== DEMEME ======================== */
const lBg=['#fff','#2020ff','#cc0000','#555','#aa8800','#006000'];
const lFg=['#111','#fff','#fff','#fff','#fff','#fff'];
function buildDememe(id) {
  const vtype = VENUES[currentVenueJcd]?.type || 'sea';
  const list  = DEMEME[vtype] || DEMEME.sea;
  const max   = list[0].r;
  document.getElementById(id).innerHTML = list.map(d => {
    const dots = d.c.split('-').map(n =>
      `<span class="d-dot" style="background:${lBg[+n-1]};color:${lFg[+n-1]}">${n}</span>`
    ).join('<span class="d-sep">-</span>');
    const pct  = Math.round(d.r/max*100);
    return `<div class="dc${d.hot?' hot':''}">
      ${d.hot?'<div style="font-size:9px;color:var(--gold);font-family:var(--mono);font-weight:700;margin-bottom:2px">HOT🔥</div>':''}
      <div class="d-circles">${dots}</div>
      <div class="d-rate">${d.r}%</div>
      <div class="d-bar"><div class="d-fill" style="width:${pct}%;background:${d.hot?'var(--gold)':'var(--accent)'}"></div></div>
    </div>`;
  }).join('');
}

function clickMG(lane, g) {
  const md = loadMotor(lane);
  saveMotor(lane, md.grade === g ? '' : g, document.getElementById('note'+lane)?.value || md.note);
  buildEntryList(raceData?.racers || []);
  showToast('💾 保存しました');
}
function saveNote(lane) {
  const md = loadMotor(lane);
  saveMotor(lane, md.grade, document.getElementById('note'+lane)?.value || '');
  debouncedToast();
}
function saveEx(lane) {
  saveExhibit(currentRace, lane,
    document.getElementById('et'+lane)?.value || '',
    document.getElementById('st'+lane)?.value || ''
  );
  debouncedToast();
  if (document.getElementById('page-stats').classList.contains('active') && raceData) buildStatsList(raceData.racers);
}
function toggleFixed(lane) {
  fixedFirst = fixedFirst === lane ? null : lane;
  buildEntryList(raceData?.racers || []);
  updateFixedBar();
}
function updateFixedBar() {
  const bar = document.getElementById('fixedBar');
  const txt = document.getElementById('fixedTxt');
  if (fixedFirst) {
    bar.className = 'fixed-bar';
    txt.innerHTML = `🏆 <strong style="color:var(--gold)">${fixedFirst}号艇</strong>を1着に固定中`;
    if (!document.getElementById('fixedClear')) {
      const btn = Object.assign(document.createElement('button'), {
        id: 'fixedClear', textContent: '解除',
        style: 'background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:3px;cursor:pointer;'
      });
      btn.onclick = () => { fixedFirst = null; buildEntryList(raceData?.racers||[]); updateFixedBar(); };
      bar.appendChild(btn);
    }
  } else {
    bar.className = 'fixed-bar none';
    txt.textContent = '1着固定：未設定（出走表で設定）';
    document.getElementById('fixedClear')?.remove();
  }
}
let toastTimer;
function debouncedToast() { clearTimeout(toastTimer); toastTimer = setTimeout(() => showToast('💾 保存しました'), 900); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ======================== AI PREDICT ======================== */
async function runPredict() {
  const btn = document.getElementById('predictBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 解析中...';
  const aiBox = document.getElementById('aiBox');
  const aiText = document.getElementById('aiText');
  aiBox.style.display = 'block';
  document.getElementById('predCards').style.display = 'none';
  aiText.textContent = '最新データ + コンディションを解析中...';
  aiText.className = 'ai-text loading';

  const racers = raceData?.racers || [];
  const wind = document.getElementById('windDir').value;
  const tide = document.getElementById('tideType').value;
  const v    = VENUES[currentVenueJcd];
  const fixLine = fixedFirst ? `\n【1着固定】${fixedFirst}号艇を1着に固定。三連単は全て${fixedFirst}-?-?の形式で。` : '';
  const weather = raceData?.weather || {};

  const lines = racers.map(r => {
    const md = loadMotor(r.lane);
    const ex = loadExhibit(currentRace, r.lane);
    if (r.exhibitTime != null) ex.exhibitTime = r.exhibitTime;
    if (r.exhibitST   != null) ex.st = r.exhibitST;
    return `${r.lane}号艇:${r.name||'不明'}(${r.cls||'—'}/${r.branch||'—'}) `+
      `全国${r.allRate||0}/当地${r.localRate||0}/2連${r.all2Rate||0}% F/L:${r.fl||'0/0'} avgST:${r.avgST||0.18} `+
      `単勝:${r.odds!=null?r.odds.toFixed(1)+'倍':'不明'} モーター:${md.grade||'未評価'}(2連${r.motor2Rate||0}%) `+
      `展示:${ex.exhibitTime||'不明'} 展示ST:${ex.st||'不明'} メモ:${md.note||'なし'}`;
  }).join('\n');

  const wAdv = windAdvice[wind]?.items.map(i=>i.b+':'+i.t).join(' / ') || '';
  const tAdv = tideAdvice[tide]?.items.map(i=>i.b+':'+i.t).join(' / ') || '';
  const vtype = v?.type === 'fresh' ? '淡水（イン有利傾向）' : v?.type === 'brackish' ? '汽水（潮の影響あり）' : '海水（風・潮の影響大）';

  const prompt = `ボートレース専門予想師として以下の最新データを分析し、JSON形式のみで回答してください。

【${v?.name||''}（場コード${currentVenueJcd}）第${currentRace}レース】
水面タイプ: ${vtype}
水面特性: ${v?.note||''}
天候:${weather.sky||'不明'} 風速:${weather.wind||'不明'}m/s 水温:${weather.water||'不明'}℃ 波高:${weather.wave||'不明'}cm
選択条件 — 風向:${wind} / 潮位:${tide}
${fixLine}

【風況分析】${wAdv}
【潮位分析】${tAdv}

【出走表（boatrace.jp実データ）】
${lines}

JSON形式のみ(バッククォート不要):
{"analysis":"280文字以内。水面特性・風況・潮位・モーター評価・展示を踏まえた総合分析","wind_effect":"90文字","tide_effect":"90文字","motor_comment":"80文字","honmei":"${fixedFirst?fixedFirst+'-?-?':'?-?-?'}","taisho":"対抗2着艇番","sanren_list":["三連単1","三連単2","三連単3"],"focus":"注目艇番","focus_reason":"80文字"}`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1200,
        messages:[{ role:'user', content:prompt }] })
    });
    const data = await res.json();
    const raw  = data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const jm   = raw.match(/\{[\s\S]*\}/);
    if (!jm) throw new Error('no json');
    const r = JSON.parse(jm[0]);
    aiText.className = 'ai-text';
    aiText.innerHTML = `<strong style="color:var(--accent2)">▶ AI予想（${v?.name}）</strong><br><br>${r.analysis}<br><br>`+
      `<strong style="color:var(--gold)">注目: ${r.focus}号艇</strong> — ${r.focus_reason}`;
    const sl = r.sanren_list || [r.honmei];
    document.getElementById('predScroll').innerHTML = [
      {t:'◎本命', v:r.honmei, main:true, note: fixedFirst?`${fixedFirst}号艇固定`:'最有力'},
      ...sl.map((s,i) => ({t:i===0?'三連単①':i===1?'三連単②':'三連単③', v:s, main:i===0, note:i===0?'最有力':i===1?'対抗':'押さえ'}))
    ].map(c => `<div class="pred-chip${c.main?' main':''}"><div class="pc-type">${c.t}</div><div class="pc-val">${c.v}</div><div class="pc-note">${c.note}</div></div>`).join('');
    document.getElementById('effCards').innerHTML = `
      <div class="eff-card"><div class="eff-icon">💨</div><div class="eff-lbl">風況影響</div><div class="eff-text">${r.wind_effect}</div></div>
      <div class="eff-card"><div class="eff-icon">🌊</div><div class="eff-lbl">潮位影響</div><div class="eff-text">${r.tide_effect}</div></div>
      <div class="eff-card"><div class="eff-icon">⚙️</div><div class="eff-lbl">モーター</div><div class="eff-text">${r.motor_comment}</div></div>`;
    document.getElementById('predCards').style.display = 'block';
  } catch (e) {
    aiText.className = 'ai-text';
    aiText.textContent = '予想生成中にエラーが発生しました。もう一度お試しください。';
  }
  btn.disabled = false; btn.innerHTML = '⚡ AI予想を生成';
}

/* ======================== PAGE / CLOCK ======================== */
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
}
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}

/* ======================== INIT ======================== */
(function init() {
  const now = new Date();
  document.getElementById('dateInput').value =
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  updateVenueUI();
  buildVenueInfo();
  loadPrefs();
  buildDememe('dememe1');
  buildDememe('dememe2');
  updateAdvice();
  buildEntryList([]);
  buildStatsList([]);
  updateFixedBar();
  tick();
  setInterval(tick, 1000);
  checkServer();
  setInterval(checkServer, 30000);

  document.getElementById('raceStateBox').innerHTML = `
    <div class="state-box">
      <div class="state-title">👆 競艇場を選んで「取得」</div>
      <div class="state-sub">
        左上の競艇場名をタップ → 全24場から選択<br>
        日付を選んで「取得」ボタンで最新データを表示<br><br>
        <strong>本日の主な開催:</strong><br>
        <a href="https://www.boatrace.jp/owpc/pc/race/index" target="_blank" style="color:var(--accent)">boatrace.jp で確認 →</a>
      </div>
    </div>`;
})();
</script>
