<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ボートレース 予想</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --bg:#07101d;--bg2:#0d1825;--bg3:#121f30;
  --border:rgba(0,180,255,0.15);--border2:rgba(0,180,255,0.32);
  --accent:#00b4ff;--accent2:#00ffcc;--gold:#f5c518;--red:#ff4060;
  --orange:#ff8c30;--purple:#a875ff;--text:#c8e0ff;--muted:#4e6a88;
  --mono:'Share Tech Mono',monospace;--sans:'Noto Sans JP',sans-serif;
  --hdr:52px;--nav:56px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);}
button{touch-action:manipulation;font-family:var(--sans);}
input,select{font-family:var(--sans);}
#hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px 0 12px;z-index:200;padding-top:env(safe-area-inset-top,0);}
.hdr-l{display:flex;align-items:center;gap:10px;}
.race-tag{background:rgba(0,180,255,0.15);border:1px solid var(--accent);color:var(--accent);font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 9px;border-radius:3px;white-space:nowrap;}
.hdr-info{line-height:1.3;}
.hdr-name{font-size:12px;font-weight:500;}
.hdr-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}
.hdr-r{display:flex;align-items:center;gap:8px;}
.clock{font-family:var(--mono);font-size:14px;color:var(--accent);}
.fetch-btn{background:rgba(0,255,204,0.1);border:1px solid var(--accent2);color:var(--accent2);font-size:12px;font-weight:700;padding:6px 11px;border-radius:3px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:opacity 0.2s;}
.fetch-btn:active{opacity:0.6;}
.fetch-btn:disabled{opacity:0.35;cursor:not-allowed;}
.spin{display:inline-block;font-style:normal;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#content{position:fixed;top:var(--hdr);left:0;right:0;bottom:calc(var(--nav) + var(--safe-b));overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px;}
.page.active{display:block;}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe-b));background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:var(--safe-b);}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;color:var(--muted);}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}
.nav-lbl{font-size:9px;letter-spacing:0.05em;}
.sec{font-size:10px;color:var(--muted);letter-spacing:0.2em;font-family:var(--mono);padding:12px 14px 6px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
.state-box{margin:20px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px 20px;text-align:center;}
.state-title{font-size:15px;font-weight:700;margin-bottom:8px;}
.state-sub{font-size:12px;color:var(--muted);line-height:1.6;}
.state-box.err{border-color:rgba(255,64,96,0.3);}
.state-box.loading .spin-big{font-size:28px;display:block;animation:spin 1s linear infinite;margin-bottom:12px;}
.date-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 0;}
.venue-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--sans);font-size:13px;padding:6px 8px;border-radius:5px;outline:none;-webkit-appearance:none;flex:0 0 auto;}
.venue-sel:focus{border-color:var(--accent);}
.date-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 10px;border-radius:5px;outline:none;flex:1;}
.date-input:focus{border-color:var(--accent);}
.go-btn{background:rgba(0,180,255,0.15);border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:700;padding:7px 14px;border-radius:5px;cursor:pointer;white-space:nowrap;}
.race-scroll{display:flex;gap:8px;padding:8px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.race-scroll::-webkit-scrollbar{display:none;}
.race-chip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;text-align:center;min-width:64px;}
.race-chip.active{background:rgba(0,180,255,0.15);border-color:var(--accent);}
.chip-num{font-family:var(--mono);font-size:13px;font-weight:700;}
.chip-time{font-size:10px;color:var(--muted);font-family:var(--mono);}
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 14px;}
.cond-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.cond-lbl{font-size:9px;color:var(--muted);letter-spacing:0.12em;font-family:var(--mono);margin-bottom:3px;}
.cond-val{font-size:14px;font-weight:500;}
.cond-val.live{color:var(--accent2);}
.cond-sel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 5px;border-radius:4px;width:100%;margin-top:2px;-webkit-appearance:none;outline:none;}
.adv-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;padding:12px 14px;}
.adv-title{font-size:11px;font-family:var(--mono);font-weight:700;margin-bottom:8px;}
.adv-item{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px;}
.adv-badge{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.ab-g{background:rgba(0,255,204,0.12);color:var(--accent2);border:1px solid rgba(0,255,204,0.25);}
.ab-r{background:rgba(255,64,96,0.12);color:var(--red);border:1px solid rgba(255,64,96,0.25);}
.ab-y{background:rgba(245,193,24,0.12);color:var(--gold);border:1px solid rgba(245,193,24,0.25);}
.ab-m{background:rgba(78,106,136,0.15);color:var(--muted);border:1px solid rgba(78,106,136,0.25);}
.adv-text{font-size:12px;line-height:1.5;color:var(--text);}
.dememe-scroll{display:flex;gap:8px;padding:4px 14px 8px;overflow-x:auto;scrollbar-width:none;}
.dememe-scroll::-webkit-scrollbar{display:none;}
.dc{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;min-width:88px;}
.dc.hot{border-color:rgba(245,193,24,0.4);}
.d-circles{display:flex;align-items:center;gap:2px;margin-bottom:3px;}
.d-dot{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;}
.d-sep{font-size:9px;color:var(--muted);}
.d-rate{font-size:10px;color:var(--muted);font-family:var(--mono);}
.d-bar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-top:4px;}
.d-fill{height:100%;border-radius:1px;}
.entry-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;overflow:hidden;transition:border-color 0.15s;}
.entry-card.fixed{border-color:var(--gold);}
.entry-top{display:flex;align-items:stretch;}
.lane-col{display:flex;align-items:center;justify-content:center;width:44px;font-size:22px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.l1{background:#fff;color:#111;}.l2{background:#2020ff;color:#fff;}.l3{background:#cc0000;color:#fff;}.l4{background:#555;color:#fff;}.l5{background:#aa8800;color:#fff;}.l6{background:#006000;color:#fff;}
.entry-main{flex:1;padding:10px 10px 8px;min-width:0;}
.entry-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.entry-name{font-size:15px;font-weight:700;}
.ecls{font-size:11px;font-family:var(--mono);font-weight:700;}
.cls-A1{color:var(--gold);}.cls-A2{color:#aaa;}.cls-B1{color:#7ad;}.cls-B2{color:var(--muted);}
.entry-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.sm{text-align:center;}
.sm-l{font-size:9px;color:var(--muted);font-family:var(--mono);}
.sm-v{font-size:12px;font-weight:500;font-family:var(--mono);}
.sm-hi{color:var(--accent2);}.sm-md{color:var(--accent);}.sm-lo{color:var(--muted);}
.sm-div{width:1px;height:22px;background:var(--border);}
.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.prob-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
.prob-track{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.prob-fill{height:100%;border-radius:3px;}
.prob-pct{font-size:12px;font-weight:700;font-family:var(--mono);min-width:34px;text-align:right;}
.odds-col{padding:10px 10px 10px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--border);flex-shrink:0;}
.odds-val{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--gold);}
.odds-lbl{font-size:9px;color:var(--muted);}
.entry-bot{border-top:1px solid var(--border);background:rgba(0,0,0,0.2);padding:7px 10px;}
.mrow{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
.motor-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.mg-btns{display:flex;gap:4px;}
.mg-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:700;width:32px;height:28px;border-radius:4px;cursor:pointer;}
.mg-S.on{background:rgba(255,64,96,0.2);border-color:var(--red);color:var(--red);}
.mg-A.on{background:rgba(245,193,24,0.2);border-color:var(--gold);color:var(--gold);}
.mg-B.on{background:rgba(0,180,255,0.2);border-color:var(--accent);color:var(--accent);}
.mg-C.on{background:rgba(0,255,204,0.15);border-color:var(--accent2);color:var(--accent2);}
.mg-D.on{background:rgba(78,106,136,0.2);border-color:var(--muted);color:var(--muted);}
.fix1-btn{margin-left:auto;background:none;border:1px solid var(--border2);color:var(--muted);font-size:10px;font-family:var(--mono);font-weight:700;padding:4px 10px;border-radius:3px;cursor:pointer;white-space:nowrap;}
.fix1-btn.on{background:rgba(245,193,24,0.15);border-color:var(--gold);color:var(--gold);}
.ex-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:5px;}
.ex-grp{display:flex;align-items:center;gap:5px;}
.ex-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.ex-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:13px;font-weight:700;padding:4px 7px;border-radius:4px;width:100%;outline:none;min-width:0;}
.ex-input:focus{border-color:var(--accent2);}
.ex-input::placeholder{color:var(--muted);font-size:11px;}
.note-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:5px 8px;border-radius:4px;width:100%;outline:none;}
.note-inp:focus{border-color:var(--accent2);}
.note-inp::placeholder{color:var(--muted);}
.stats-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:0 14px 8px;overflow:hidden;}
.stats-hdr{display:flex;align-items:center;}
.stats-lane{display:flex;align-items:center;justify-content:center;width:44px;font-size:20px;font-weight:700;font-family:var(--mono);padding:12px 0;flex-shrink:0;}
.stats-title{flex:1;padding:10px 12px;}
.stats-name2{font-size:15px;font-weight:700;}
.stats-sub{font-size:11px;color:var(--muted);}
.stats-body{padding:10px 14px;border-top:1px solid var(--border);}
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
.s-box{background:var(--bg3);border-radius:6px;padding:8px 6px;text-align:center;}
.s-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;line-height:1.3;}
.s-val{font-size:15px;font-weight:700;font-family:var(--mono);}
.rate-bars{display:grid;gap:5px;}
.rate-row{display:flex;align-items:center;gap:8px;}
.rate-lbl{font-size:11px;color:var(--muted);width:78px;flex-shrink:0;}
.rate-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.rate-fill{height:100%;border-radius:3px;}
.rate-pct{font-size:11px;font-weight:700;font-family:var(--mono);width:36px;text-align:right;}
.ex-disp{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.ex-d-box{background:var(--bg3);border-radius:6px;padding:8px;text-align:center;}
.ex-d-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.ex-d-val{font-size:18px;font-weight:700;font-family:var(--mono);color:var(--accent2);}
.ex-d-val.none{color:var(--muted);font-size:13px;}
.fixed-bar{margin:8px 14px;background:rgba(245,193,24,0.08);border:1px solid rgba(245,193,24,0.28);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.fixed-bar.none{background:rgba(0,180,255,0.05);border-color:var(--border);}
.pb-main{display:block;width:calc(100% - 28px);margin:0 14px 10px;background:rgba(0,180,255,0.15);border:1px solid var(--accent);color:var(--accent);font-size:14px;font-weight:700;padding:13px;border-radius:8px;cursor:pointer;text-align:center;}
.pb-main:active{background:rgba(0,180,255,0.25);}
.pb-main:disabled{opacity:0.4;cursor:not-allowed;}
.ai-box{background:var(--bg2);border:1px solid rgba(0,255,204,0.2);border-radius:10px;margin:0 14px 8px;padding:14px;}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ai-badge{width:24px;height:24px;border:1px solid var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--accent2);font-family:var(--mono);font-weight:bold;flex-shrink:0;}
.ai-lbl{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:0.12em;font-family:var(--mono);}
.ai-text{font-size:12px;line-height:1.85;color:var(--text);}
.ai-text.loading{color:var(--muted);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.pred-section{margin:0 14px 4px;display:flex;align-items:center;gap:8px;}
.pred-section-lbl{font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:0.08em;padding:3px 8px;border-radius:4px;}
.pred-section-lbl.matoi{background:rgba(0,200,140,0.15);color:var(--accent2);border:1px solid rgba(0,200,140,0.3);}
.pred-section-lbl.ana{background:rgba(245,193,24,0.12);color:var(--gold);border:1px solid rgba(245,193,24,0.3);}
.pred-section-sub{font-size:9px;color:var(--muted);}
.pred-scroll{display:flex;gap:8px;padding:0 14px 10px;overflow-x:auto;scrollbar-width:none;}
.pred-scroll::-webkit-scrollbar{display:none;}
.pred-chip{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;min-width:100px;}
.pred-chip.matoi{border-color:rgba(0,200,140,0.35);}
.pred-chip.matoi .pc-val{color:var(--accent2);}
.pred-chip.ana{border-color:rgba(245,193,24,0.35);}
.pred-chip.ana .pc-val{color:var(--gold);}
.pc-type{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:4px;}
.pc-val{font-size:18px;font-weight:700;font-family:var(--mono);}
.pc-note{font-size:10px;color:var(--muted);margin-top:2px;}
.eff-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 8px;}
.eff-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.eff-icon{font-size:15px;margin-bottom:3px;}
.eff-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);margin-bottom:3px;}
.eff-text{font-size:11px;line-height:1.5;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,180,255,0.25);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;}
.srv-status{display:flex;align-items:center;gap:6px;font-size:10px;font-family:var(--mono);padding:6px 14px 0;}
.srv-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.srv-dot.ok{background:var(--accent2);box-shadow:0 0 5px var(--accent2);}
.srv-dot.err{background:var(--red);}
.srv-dot.checking{background:var(--muted);}
.motor-info-badge{font-size:10px;color:var(--muted);font-family:var(--mono);background:rgba(255,255,255,0.04);padding:2px 7px;border-radius:3px;border:1px solid var(--border);}
.odds-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin:0 14px 8px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.op-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);letter-spacing:0.12em;flex-shrink:0;}
.op-items{display:flex;gap:8px;flex-wrap:wrap;}
.op-item{display:flex;flex-direction:column;align-items:center;gap:2px;}
.op-boat{width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.op-odds{font-size:11px;font-weight:700;font-family:var(--mono);}
.op-fav{color:var(--gold);}.op-mid{color:var(--accent2);}.op-ana{color:var(--orange);}.op-big{color:var(--red);}
.exhibit-btn{background:rgba(0,255,204,0.08);border:1px solid rgba(0,255,204,0.25);color:var(--accent2);font-size:10px;font-family:var(--mono);font-weight:700;padding:3px 9px;border-radius:4px;cursor:pointer;margin-left:auto;}
.exhibit-btn:active{opacity:0.6;}
.cache-tag{font-size:9px;font-family:var(--mono);background:rgba(0,180,255,0.1);color:var(--accent);border:1px solid rgba(0,180,255,0.25);padding:2px 7px;border-radius:3px;}
.pc-odds{font-size:9px;font-family:var(--mono);margin-top:1px;}
#toast{position:fixed;bottom:calc(var(--nav) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,200,140,0.92);color:#041a10;font-size:12px;font-weight:700;padding:7px 16px;border-radius:20px;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;font-family:var(--mono);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.45;}}
</style>
</head>
<body>

<header id="hdr">
  <div class="hdr-l">
    <div class="race-tag" id="hdrTag">—</div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdrName">場所を選択してください</div>
      <div class="hdr-sub">
        <span class="srv-status" id="srvStatus">
          <span class="srv-dot checking" id="srvDot"></span>
          <span id="srvTxt">サーバー確認中...</span>
        </span>
      </div>
    </div>
  </div>
  <div class="hdr-r">
    <div class="clock" id="clock"></div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchAllData()">
      <i class="r-icon">↻</i> 取得
    </button>
  </div>
</header>

<div id="content">

  <!-- ── PAGE 1: RACE ── -->
  <div class="page active" id="page-race">
    <div class="date-bar">
      <select class="venue-sel" id="venueSelect" onchange="onVenueChange()"></select>
      <input type="date" class="date-input" id="dateInput">

<script>
/* ======================== CONFIG ======================== */
const SERVER_URL = ''; // 本番: 空文字（相対URL）/ ローカル: 'http://localhost:3000'

/* ======================== STATE ======================== */
let VENUE_JCD  = localStorage.getItem('br_venue') || '04';
let VENUE_NAME = '';
let MEET_KEY   = `br_${VENUE_JCD}`;
let currentRace = 1;
let fixedFirst  = null;
let raceData    = null;
let serverOk    = false;
let motorGrades = {};
let motorNotes  = {};
let exhibitData = {};

/* ======================== VENUE ======================== */
async function loadVenues() {
  try {
    const res    = await fetch(`${SERVER_URL}/api/venues`);
    const venues = await res.json();
    const sel    = document.getElementById('venueSelect');
    sel.innerHTML = venues.map(v =>
      `<option value="${v.jcd}"${v.jcd === VENUE_JCD ? ' selected' : ''}>${v.name}</option>`
    ).join('');
    const found = venues.find(v => v.jcd === VENUE_JCD) || venues[0];
    if (found) applyVenue(found.jcd, found.name);
  } catch (e) {
    document.getElementById('venueSelect').innerHTML = '<option value="04">平和島</option>';
    applyVenue('04', '平和島');
  }
}

function applyVenue(jcd, name) {
  VENUE_JCD  = jcd;
  VENUE_NAME = name;
  MEET_KEY   = `br_${jcd}`;
  document.getElementById('hdrTag').textContent  = name;
  document.getElementById('hdrName').textContent = `ボートレース${name}`;
  document.title = `${name} 予想`;
}

function onVenueChange() {
  const sel = document.getElementById('venueSelect');
  const opt = sel.options[sel.selectedIndex];
  applyVenue(opt.value, opt.text);
  localStorage.setItem('br_venue', opt.value);
  raceData   = null;
  fixedFirst = null;
  buildEntryList([]);
  buildStatsList([]);
  document.getElementById('raceScroll').innerHTML = '';
  document.getElementById('raceStateBox').innerHTML = '';
  document.getElementById('aiBox').style.display   = 'none';
  document.getElementById('predCards').style.display = 'none';
}

/* ======================== STORAGE ======================== */
function stor(k, v) {
  try {
    if (v === undefined) return JSON.parse(localStorage.getItem(k));
    localStorage.setItem(k, JSON.stringify(v));
  } catch {}
  return null;
}
function saveMotor(lane, grade, note) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  motorGrades[lane] = grade;
  motorNotes[lane]  = note;
  stor(`${MEET_KEY}_mg_${date}_l${lane}`, { grade, note });
}
function loadMotor(lane) {
  const date  = document.getElementById('dateInput').value.replace(/-/g,'');
  const saved = stor(`${MEET_KEY}_mg_${date}_l${lane}`);
  return saved || { grade: motorGrades[lane]||'', note: motorNotes[lane]||'' };
}
function saveExhibit(race, lane, exhibitTime, st) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  if (!exhibitData[race]) exhibitData[race] = {};
  exhibitData[race][lane] = { exhibitTime, st };
  stor(`${MEET_KEY}_ex_${date}_r${race}_l${lane}`, { exhibitTime, st });
}
function loadExhibit(race, lane) {
  const date = document.getElementById('dateInput').value.replace(/-/g,'');
  return stor(`${MEET_KEY}_ex_${date}_r${race}_l${lane}`) || { exhibitTime:'', st:'' };
}
function savePrefs() {
  stor(`${MEET_KEY}_prefs`, {
    wind: document.getElementById('windDir').value,
    tide: document.getElementById('tideType').value,
  });
}
function loadPrefs() {
  const p = stor(`${MEET_KEY}_prefs`);
  if (!p) return;
  if (p.wind) document.getElementById('windDir').value = p.wind;
  if (p.tide) document.getElementById('tideType').value = p.tide;
}

/* ======================== ODDS PANEL ======================== */
function buildOddsPanel() {
  const panel = document.getElementById('oddsPanel');
  const items = document.getElementById('opItems');
  if (!raceData || !raceData.racers || raceData.racers.length === 0) {
    panel.style.display = 'none';
    return;
  }
  const bgList = ['#fff','#2020ff','#cc0000','#555','#aa8800','#006000'];
  const fgList = ['#111','#fff','#fff','#fff','#fff','#fff'];
  items.innerHTML = raceData.racers.map(r => {
    const o = r.odds;
    const cls = o == null ? '' : o < 3 ? 'op-fav' : o < 10 ? 'op-mid' : o < 30 ? 'op-ana' : 'op-big';
    return `<div class="op-item">
      <div class="op-boat" style="background:${bgList[r.lane-1]};color:${fgList[r.lane-1]}">${r.lane}</div>
      <div class="op-odds ${cls}">${o != null ? o.toFixed(1) : '—'}</div>
    </div>`;
  }).join('');
  panel.style.display = 'flex';
}

/* ======================== SERVER CHECK ======================== */
async function checkServer() {
  const dot = document.getElementById('srvDot');
  const txt = document.getElementById('srvTxt');
  dot.className = 'srv-dot checking';
  txt.textContent = '接続確認中...';
  try {
    const res = await fetch(`${SERVER_URL}/api/health`, { signal: AbortSignal.timeout(20000) });
    if (res.ok) {
      serverOk = true;
      dot.className = 'srv-dot ok';
      txt.textContent = 'サーバー接続済み';
      return true;
    }
  } catch {}
  // ステータス表示は更新するが、データ取得はブロックしない
  serverOk = false;
  dot.className = 'srv-dot err';
  txt.textContent = '接続エラー（取得は可能）';
  return false;
}

/* ======================== DATA FETCH ======================== */
async function fetchAllData() {
  const btn     = document.getElementById('fetchBtn');
  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  if (!dateStr || dateStr.length !== 8) return alert('日付を選択してください');
  if (!VENUE_JCD) return alert('場所を選択してください');

  // serverOk チェックを廃止 — 直接取得を試みてエラーで判断する
  btn.disabled = true;
  btn.innerHTML = '<i class="spin">↻</i> 取得中...';
  showLoading(document.getElementById('raceStateBox'));

  try {
    const url  = `${SERVER_URL}/api/all?jcd=${VENUE_JCD}&hd=${dateStr}&rno=${currentRace}`;
    const res  = await fetch(url, { signal: AbortSignal.timeout(35000) });
    const data = await res.json();

    if (!res.ok || data.error) { showError(data.error || 'データ取得に失敗しました'); return; }

    raceData = data;
    serverOk = true;
    document.getElementById('srvDot').className = 'srv-dot ok';
    document.getElementById('srvTxt').textContent = 'サーバー接続済み';
    document.getElementById('raceStateBox').innerHTML = '';
    buildRaceChips(data.schedule);
    updateWeather(data.weather);
    buildEntryList(data.racers);
    buildStatsList(data.racers);
    updateAdvice();
    document.getElementById('aiBox').style.display    = 'none';
    document.getElementById('predCards').style.display = 'none';
    buildOddsPanel();
    showToast('✅ データ取得完了');
  } catch (e) {
    showError('取得エラー: ' + e.message + '（時間をおいて再試行してください）');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="r-icon">↻</i> 取得';
  }
}

async function fetchRace(rno) {
  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  if (!dateStr) return;

  currentRace = rno;
  buildRaceChips(raceData?.schedule || []);

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="spin">↻</i>';

  try {
    const url  = `${SERVER_URL}/api/all?jcd=${VENUE_JCD}&hd=${dateStr}&rno=${rno}`;
    const res  = await fetch(url, { signal: AbortSignal.timeout(35000) });
    const data = await res.json();
    if (!res.ok || data.error) { showError(data.error || 'エラー'); return; }
    raceData = data;
    document.getElementById('raceStateBox').innerHTML = '';
    updateWeather(data.weather);
    buildEntryList(data.racers);
    buildStatsList(data.racers);
    buildOddsPanel();
  } catch (e) {
    showError('取得エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="r-icon">↻</i> 取得';
  }
}

/* ======================== EXHIBIT REFRESH ======================== */
async function refreshBefore() {
  const btn = document.getElementById('beforeBtn');
  if (!raceData) { alert('先にレースデータを取得してください'); return; }
  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  btn.disabled = true;
  btn.textContent = '更新中...';
  try {
    const res  = await fetch(`${SERVER_URL}/api/before?jcd=${VENUE_JCD}&hd=${dateStr}&rno=${currentRace}`, { signal: AbortSignal.timeout(20000) });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    let updated = 0;
    raceData.racers = raceData.racers.map(r => {
      const ex = data.exhibit?.[r.lane];
      if (ex) {
        if (ex.exhibitTime != null) { r.exhibitTime = ex.exhibitTime; updated++; }
        if (ex.st         != null)   r.exhibitST   = ex.st;
      }
      return r;
    });
    if (data.weather) updateWeather(data.weather);
    buildEntryList(raceData.racers);
    buildStatsList(raceData.racers);
    showToast(updated > 0 ? `✅ 展示タイム ${updated}艇更新` : '展示データ未公開');
  } catch (e) {
    showToast('⚠ 展示取得失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '⟳ 展示タイム更新';
  }
}

/* ======================== UI HELPERS ======================== */
function showLoading(el) {
  if (el) el.innerHTML = `<div class="state-box loading"><span class="spin-big">↻</span><div class="state-title">データ取得中...</div><div class="state-sub">boatrace.jp から最新データを取得しています</div></div>`;
}
function showError(msg) {
  document.getElementById('raceStateBox').innerHTML = `
    <div class="state-box err">
      <div class="state-title" style="color:var(--red)">⚠ エラー</div>
      <div class="state-sub">${msg}</div>
    </div>`;
}
function showServerError() {
  document.getElementById('raceStateBox').innerHTML = `
    <div class="state-box err">
      <div class="state-title" style="color:var(--red)">⚠ 接続エラー</div>
      <div class="state-sub" style="margin-top:8px">
        サーバーへの接続に失敗しました。<br>時間をおいて「取得」ボタンを押してください。
      </div>
    </div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

/* ======================== RACE CHIPS ======================== */
function buildRaceChips(schedule) {
  const el = document.getElementById('raceScroll');
  if (!schedule || schedule.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = schedule.map(r => `
    <div class="race-chip${r.rno === currentRace ? ' active' : ''}" onclick="fetchRace(${r.rno})">
      <div class="chip-num">${r.rno}R</div>
      <div class="chip-time">${r.time}</div>
    </div>`).join('');
}

/* ======================== WEATHER ======================== */
function updateWeather(w) {
  if (!w) return;
  const set = (id, val) => { document.getElementById(id).textContent = val; };
  set('condSky',   w.sky   || '—');
  set('condWind',  w.wind  != null && w.wind  ? `${w.wind}m/s`  : '—');
  set('condWater', w.water != null && w.water ? `${w.water}℃`   : '—');
  set('condWave',  w.wave  != null && w.wave  ? `${w.wave}cm`   : '—');
}

function updateAdvice() {
  const w = document.getElementById('windDir').value;
  const t = document.getElementById('tideType').value;
  renderAdv('windAdvTitle','windAdvBody', windAdvice[w]);
  renderAdv('tideAdvTitle','tideAdvBody', tideAdvice[t]);
}
function renderAdv(tid, bid, d) {
  document.getElementById(tid).innerHTML = `<span style="color:${d.c}">${d.l}</span>`;
  document.getElementById(bid).innerHTML = d.items.map(i =>
    `<div class="adv-item"><span class="adv-badge ${i.cls}">${i.b}</span><span class="adv-text">${i.t}</span></div>`
  ).join('');
}

const dememeList = [
  {c:'1-2-3',r:8.4,hot:true},{c:'1-2-4',r:6.1,hot:true},{c:'1-3-2',r:5.8,hot:true},
  {c:'2-1-3',r:4.9},{c:'1-3-4',r:4.2},{c:'1-4-2',r:3.9},
  {c:'2-3-1',r:3.5},{c:'3-1-2',r:3.2},{c:'1-2-6',r:2.9},{c:'2-4-1',r:2.7},
];
const lBg = ['#fff','#2020ff','#cc0000','#555','#aa8800','#006000'];
const lFg = ['#111','#fff','#fff','#fff','#fff','#fff'];
function buildDememe(id) {
  const max = dememeList[0].r;
  document.getElementById(id).innerHTML = dememeList.map(d => {
    const dots = d.c.split('-').map(n => `<span class="d-dot" style="background:${lBg[+n-1]};color:${lFg[+n-1]}">${n}</span>`).join('<span class="d-sep">-</span>');
    const pct  = Math.round(d.r / max * 100);
    return `<div class="dc${d.hot?' hot':''}">
      ${d.hot?'<div style="font-size:9px;color:var(--gold);font-family:var(--mono);font-weight:700;margin-bottom:2px">HOT🔥</div>':''}
      <div class="d-circles">${dots}</div>
      <div class="d-rate">${d.r}%</div>
      <div class="d-bar"><div class="d-fill" style="width:${pct}%;background:${d.hot?'var(--gold)':'var(--accent)'}"></div></div>
    </div>`;
  }).join('');
}

/* ======================== ENTRY LIST ======================== */
const pColors = ['#00ffcc','#00b4ff','#3ab4ff','#5a7a99','#5a7a99','#5a7a99'];

function buildEntryList(racers) {
  if (!racers || racers.length === 0) {
    document.getElementById('entryList').innerHTML = '<div class="state-box"><div class="state-sub">データを取得してください</div></div>';
    return;
  }
  document.getElementById('entryList').innerHTML = racers.map((r, i) => {
    const isFixed = fixedFirst === r.lane;
    const md  = loadMotor(r.lane);
    const ex  = { ...loadExhibit(currentRace, r.lane) };
    if (r.exhibitTime != null) ex.exhibitTime = r.exhibitTime;
    if (r.exhibitST   != null) ex.st          = r.exhibitST;

    const rc  = r.allRate   >= 6.5 ? 'sm-hi' : r.allRate   >= 5.5 ? 'sm-md' : 'sm-lo';
    const lc  = r.localRate >= 6.5 ? 'sm-hi' : r.localRate >= 5.5 ? 'sm-md' : 'sm-lo';
    const stC = !ex.st ? 'sm-lo' : parseFloat(ex.st) <= 0.10 ? 'sm-hi' : parseFloat(ex.st) >= 0.20 ? 'sm-lo' : 'sm-md';
    const mgBtns = ['S','A','B','C','D'].map(g =>
      `<button class="mg-btn mg-${g}${md.grade===g?' on':''}" onclick="clickMG(${r.lane},'${g}')">${g}</button>`
    ).join('');
    const odds     = r.odds != null ? r.odds.toFixed(1) : '—';
    const motorInfo = r.motorNo ? `No.${r.motorNo} 2連:${r.motor2Rate?.toFixed(1)||0}%` : '';

    return `<div class="entry-card${isFixed?' fixed':''}" id="ec${r.lane}">
      <div class="entry-top">
        <div class="lane-col l${r.lane}">${r.lane}</div>
        <div class="entry-main">
          <div class="entry-row1">
            <span class="entry-name">${r.name||'—'}</span>
            <span class="ecls cls-${r.cls}">${r.cls||'—'}</span>
          </div>
          <div class="entry-row2">
            <div class="sm"><div class="sm-l">全国勝率</div><div class="sm-v ${rc}">${r.allRate||0}</div></div>
            <div class="sm-div"></div>
            <div class="sm"><div class="sm-l">当地勝率</div><div class="sm-v ${lc}">${r.localRate||0}</div></div>
            <div class="sm-div"></div>
            <div class="sm"><div class="sm-l">F/L</div><div class="sm-v" style="color:${r.fl?.startsWith('1')?'var(--red)':'var(--muted)'}">${r.fl||'—'}</div></div>
            <div class="sm-div"></div>
            <div class="sm"><div class="sm-l">展示タイム</div><div class="sm-v ${ex.exhibitTime?'sm-hi':'sm-lo'}">${ex.exhibitTime||'—'}</div></div>
            <div class="sm-div"></div>
            <div class="sm"><div class="sm-l">ST</div><div class="sm-v ${stC}">${ex.st?'.'+String(ex.st).replace('0.',''):'—'}</div></div>
          </div>
          ${motorInfo ? `<div style="margin-bottom:6px"><span class="motor-info-badge">⚙️ ${motorInfo}</span></div>` : ''}
          <div class="prob-row">
            <span class="prob-lbl">出走確率</span>
            <div class="prob-track"><div class="prob-fill" style="width:${Math.min((r.allRate/8)*100,100)}%;background:${pColors[i]}"></div></div>
            <span class="prob-pct" style="color:${pColors[i]}">${r.allRate||0}</span>
          </div>
        </div>
        <div class="odds-col">
          <div class="odds-val">${odds}</div>
          <div class="odds-lbl">単勝</div>
        </div>
      </div>
      <div class="entry-bot">
        <div class="mrow">
          <span class="motor-lbl">モーター</span>
          <div class="mg-btns">${mgBtns}</div>
          <button class="fix1-btn${isFixed?' on':''}" onclick="toggleFixed(${r.lane})">${isFixed?'🏆固定中':'1着固定'}</button>
        </div>
        <div class="ex-row">
          <div class="ex-grp"><span class="ex-lbl">展示タイム</span><input class="ex-input" id="et${r.lane}" type="number" step="0.01" placeholder="6.87" value="${ex.exhibitTime||''}" oninput="saveEx(${r.lane})" style="width:70px"></div>
          <div class="ex-grp"><span class="ex-lbl">ST</span><input class="ex-input" id="st${r.lane}" type="number" step="0.01" placeholder="0.12" value="${ex.st||''}" oninput="saveEx(${r.lane})" style="width:60px"></div>
        </div>
        <input class="note-inp" id="note${r.lane}" placeholder="モーター気配・ターン評価など..." value="${md.note||''}" oninput="saveNote(${r.lane})">
      </div>
    </div>`;
  }).join('') + '<div style="height:8px"></div>';
}

function clickMG(lane, g) {
  const md = loadMotor(lane);
  const ng = md.grade === g ? '' : g;
  const note = document.getElementById('note'+lane)?.value || md.note;
  saveMotor(lane, ng, note);
  buildEntryList(raceData?.racers || []);
  showToast('💾 保存しました');
}
function saveNote(lane) {
  const md = loadMotor(lane);
  saveMotor(lane, md.grade, document.getElementById('note'+lane)?.value||'');
  debouncedToast();
}
function saveEx(lane) {
  const et = document.getElementById('et'+lane)?.value||'';
  const st = document.getElementById('st'+lane)?.value||'';
  saveExhibit(currentRace, lane, et, st);
  debouncedToast();
  if (document.getElementById('page-stats').classList.contains('active') && raceData) buildStatsList(raceData.racers);
}
function toggleFixed(lane) {
  fixedFirst = fixedFirst === lane ? null : lane;
  buildEntryList(raceData?.racers || []);
  updateFixedBar();
}
function updateFixedBar() {
  const bar = document.getElementById('fixedBar');
  const txt = document.getElementById('fixedTxt');
  if (fixedFirst) {
    bar.className = 'fixed-bar';
    txt.innerHTML = `🏆 <strong style="color:var(--gold)">${fixedFirst}号艇</strong>を1着に固定中`;
    if (!document.getElementById('fixedClear')) {
      const btn = document.createElement('button');
      btn.id = 'fixedClear';
      btn.textContent = '解除';
      btn.style.cssText = 'background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:3px 9px;border-radius:3px;cursor:pointer;';
      btn.onclick = () => { fixedFirst = null; buildEntryList(raceData?.racers||[]); updateFixedBar(); };
      bar.appendChild(btn);
    }
  } else {
    bar.className = 'fixed-bar none';
    txt.textContent = '1着固定：未設定（任意）';
    document.getElementById('fixedClear')?.remove();
  }
}
let toastTimer;
function debouncedToast() { clearTimeout(toastTimer); toastTimer = setTimeout(() => showToast('💾 保存しました'), 900); }

/* ======================== STATS LIST ======================== */
function buildStatsList(racers) {
  if (!racers || racers.length === 0) {
    document.getElementById('statsList').innerHTML = '<div class="state-box"><div class="state-sub">データを取得してください</div></div>';
    return;
  }
  document.getElementById('statsList').innerHTML = racers.map(r => {
    const md = loadMotor(r.lane);
    const ex = loadExhibit(currentRace, r.lane);
    if (r.exhibitTime != null) ex.exhibitTime = r.exhibitTime;
    if (r.exhibitST   != null) ex.st          = r.exhibitST;

    const mgC = md.grade==='S'?'var(--red)':md.grade==='A'?'var(--gold)':md.grade==='B'?'var(--accent)':md.grade==='C'?'var(--accent2)':'var(--muted)';
    const mgDisplay = md.grade ? `<span style="color:${mgC};font-family:var(--mono);font-weight:700;font-size:14px">${md.grade}</span>` : '—';

    const nigeRate   = r.lane === 1 ? (r.allRate * 6).toFixed(1) : 0;
    const sashiRate  = r.lane === 2 ? (r.allRate * 5.5).toFixed(1) : r.lane >= 3 ? (r.allRate * 3).toFixed(1) : 0;
    const makuriRate = r.lane >= 3 ? (r.allRate * 3.5).toFixed(1) : r.lane === 2 ? (r.allRate * 0.8).toFixed(1) : 0;

    return `<div class="stats-card">
      <div class="stats-hdr">
        <div class="stats-lane l${r.lane}">${r.lane}</div>
        <div class="stats-title">
          <div class="stats-name2">${r.name||'—'} <span class="ecls cls-${r.cls}" style="font-size:10px">${r.cls||''}</span></div>
          <div class="stats-sub">${r.branch||''}支部 ｜ ${r.age||''}歳 ${r.weight||''}kg ｜ 登録:${r.regNo||'—'}</div>
        </div>
        <div style="padding:10px 12px 10px 0;display:flex;align-items:center;gap:6px">
          ${mgDisplay}
          ${md.note ? `<span style="font-size:10px;color:var(--muted)">📝</span>` : ''}
        </div>
      </div>
      <div class="stats-body">
        <div class="s-grid">
          <div class="s-box"><div class="s-lbl">全国勝率</div><div class="s-val" style="color:${r.allRate>=6.5?'var(--accent2)':r.allRate>=5.5?'var(--accent)':'var(--muted)'}">${r.allRate||0}</div></div>
          <div class="s-box"><div class="s-lbl">全国2連率</div><div class="s-val" style="color:var(--accent)">${r.all2Rate||0}<span style="font-size:10px;color:var(--muted)">%</span></div></div>
          <div class="s-box"><div class="s-lbl">全国3連率</div><div class="s-val" style="color:var(--muted)">${r.all3Rate||0}<span style="font-size:10px;color:var(--muted)">%</span></div></div>
          <div class="s-box"><div class="s-lbl">当地勝率</div><div class="s-val" style="color:${r.localRate>=6.5?'var(--accent2)':r.localRate>=5.5?'var(--accent)':'var(--muted)'}">${r.localRate||0}</div></div>
          <div class="s-box"><div class="s-lbl">平均ST</div><div class="s-val" style="color:${r.avgST<=0.12?'var(--gold)':r.avgST>=0.22?'var(--red)':'var(--accent2)'}">.${String(Math.round((r.avgST||0.18)*100)).padStart(2,'0')}</div></div>
          <div class="s-box"><div class="s-lbl">F/L</div><div class="s-val" style="color:${(r.fl||'0/0').startsWith('1')?'var(--red)':'var(--muted)'}">${r.fl||'0/0'}</div></div>
        </div>
        <div class="rate-bars">
          ${r.lane===1?`<div class="rate-row"><span class="rate-lbl">逃げ率(推定)</span><div class="rate-track"><div class="rate-fill" style="width:${Math.min(nigeRate,100)}%;background:var(--accent2)"></div></div><span class="rate-pct" style="color:var(--accent2)">${nigeRate}%</span></div>`:''}
          ${r.lane>=2?`<div class="rate-row"><span class="rate-lbl">差し率(推定)</span><div class="rate-track"><div class="rate-fill" style="width:${Math.min(sashiRate,100)}%;background:var(--accent)"></div></div><span class="rate-pct" style="color:var(--accent)">${sashiRate}%</span></div>`:''}
          ${r.lane>=2?`<div class="rate-row"><span class="rate-lbl">捲り率(推定)</span><div class="rate-track"><div class="rate-fill" style="width:${Math.min(makuriRate,100)}%;background:var(--gold)"></div></div><span class="rate-pct" style="color:var(--gold)">${makuriRate}%</span></div>`:''}
          <div class="rate-row"><span class="rate-lbl">モーター2連率</span><div class="rate-track"><div class="rate-fill" style="width:${Math.min(r.motor2Rate||0,100)}%;background:var(--purple)"></div></div><span class="rate-pct" style="color:var(--purple)">${r.motor2Rate||0}%</span></div>
        </div>
        <div class="ex-disp">
          <div class="ex-d-box"><div class="ex-d-lbl">展示タイム</div><div class="ex-d-val${ex.exhibitTime?'':' none'}">${ex.exhibitTime||'未入力'}</div></div>
          <div class="ex-d-box"><div class="ex-d-lbl">ST</div><div class="ex-d-val${ex.st?'':' none'}" style="color:${ex.st?(parseFloat(ex.st)<=0.10?'var(--gold)':parseFloat(ex.st)>=0.20?'var(--red)':'var(--accent2)'):'var(--muted)'}">
            ${ex.st?'.'+String(ex.st).replace('0.',''):'未入力'}
          </div></div>
        </div>
      </div>
    </div>`;
  }).join('') + '<div style="height:8px"></div>';
}

/* ======================== AI PREDICT ======================== */
async function runPredict() {
  if (!raceData || !raceData.racers || raceData.racers.length === 0) {
    alert('先にレースデータを取得してください（↻ 取得ボタン）');
    return;
  }
  const btn       = document.getElementById('predictBtn');
  const aiBox     = document.getElementById('aiBox');
  const aiText    = document.getElementById('aiText');
  const predCards = document.getElementById('predCards');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 解析中...';
  aiBox.style.display     = 'block';
  predCards.style.display = 'none';
  aiText.textContent = 'Gemini AI がレースデータを解析中...';
  aiText.className = 'ai-text loading';

  const dateStr = document.getElementById('dateInput').value.replace(/-/g,'');
  const cacheKey = `${VENUE_JCD}_${dateStr}_${currentRace}_${fixedFirst||'0'}`;
  const racers = raceData?.racers || [];
  const wind   = document.getElementById('windDir').value;
  const tide   = document.getElementById('tideType').value;

  const fixLine = fixedFirst
    ? `\n【1着固定】${fixedFirst}号艇を1着に固定。matoi・ana ともに全て${fixedFirst}-?-? の形式にすること。`
    : '';

  const lines = racers.map(r => {
    const md = loadMotor(r.lane);
    const ex = loadExhibit(currentRace, r.lane);
    if (r.exhibitTime != null) ex.exhibitTime = r.exhibitTime;
    if (r.exhibitST   != null) ex.st          = r.exhibitST;
    return `${r.lane}号艇:${r.name||'不明'}(${r.cls||'—'}/${r.branch||'—'}) `+
      `全国${r.allRate||0}/当地${r.localRate||0}/2連${r.all2Rate||0}% F/L:${r.fl||'0/0'} avgST:${r.avgST||0.18} `+
      `単勝:${r.odds!=null?r.odds.toFixed(1)+'倍':'不明'} モーター:${md.grade||'未評価'}(2連${r.motor2Rate||0}%) `+
      `展示:${ex.exhibitTime||'不明'} 展示ST:${ex.st||'不明'} メモ:${md.note||'なし'}`;
  }).join('\n');

  const wAdv    = windAdvice[wind]?.items.map(i=>i.b+':'+i.t).join(' / ') || '';
  const tAdv    = tideAdvice[tide]?.items.map(i=>i.b+':'+i.t).join(' / ') || '';
  const weather = raceData?.weather || {};

  const prompt = `ボートレース専門予想師として以下の最新データを分析し、JSON形式のみで回答してください。

【${VENUE_NAME} 第${currentRace}レース】
天候:${weather.sky||'不明'} 風速:${weather.wind||'不明'}m/s 水温:${weather.water||'不明'}℃ 波高:${weather.wave||'不明'}cm
選択条件 — 風向:${wind} / 潮位:${tide}
${fixLine}

【風況分析】${wAdv}
【潮位分析】${tAdv}

【出走表（boatrace.jp 実データ）】
${lines}

以下のJSON形式のみで回答（バッククォート不要）:
{
  "analysis": "280文字以内の総合分析",
  "wind_effect": "90文字以内",
  "tide_effect": "90文字以内",
  "motor_comment": "80文字以内",
  "focus": "注目艇番号（数字のみ）",
  "focus_reason": "80文字以内",
  "matoi": ["的中重視①","的中重視②","的中重視③","的中重視④","的中重視⑤"],
  "ana":   ["穴予想①","穴予想②","穴予想③","穴予想④","穴予想⑤"]
}
matoiは三連単の的中重視フォーメーション5点（堅い本命軸）、
anaは高配当を狙う穴フォーメーション5点（オッズ100倍以上を意識）。
全て "艇番-艇番-艇番" 形式（例: "1-2-3"）で記載。重複なし。`;

  try {
    const res  = await fetch('/api/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, cacheKey }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'APIエラー');
    document.getElementById('cacheTag').style.display = data.cached ? 'inline' : 'none';
    const raw = data.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const jm  = raw.match(/\{[\s\S]*\}/);
    if (!jm) throw new Error('JSONが見つかりません');
    const r = JSON.parse(jm[0]);

    aiText.className = 'ai-text';
    aiText.innerHTML =
      `<strong style="color:var(--accent2)">▶ AI予想レポート</strong><br><br>${r.analysis}<br><br>`+
      `<strong style="color:var(--gold)">注目: ${r.focus}号艇</strong> — ${r.focus_reason}`;

    const matoiList = (r.matoi || []).slice(0, 5);
    const anaList   = (r.ana   || []).slice(0, 5);
    const oddsMap   = Object.fromEntries((raceData?.racers||[]).map(x => [x.lane, x.odds]));

    function chipOdds(combo) {
      const first = parseInt((combo||'').split('-')[0]);
      const o = oddsMap[first];
      return o != null ? `<div class="pc-odds" style="color:${o<3?'var(--gold)':o<10?'var(--accent2)':o<30?'var(--orange)':'var(--red)'}">${first}号 ${o.toFixed(1)}倍</div>` : '';
    }

    document.getElementById('predScrollMatoi').innerHTML =
      matoiList.map((v, i) =>
        `<div class="pred-chip matoi"><div class="pc-type">的中重視 ${['①','②','③','④','⑤'][i]||i+1}</div><div class="pc-val">${v}</div><div class="pc-note">${i===0?'◎本命':i===1?'対抗':'押さえ'}</div>${chipOdds(v)}</div>`
      ).join('');

    document.getElementById('predScrollAna').innerHTML =
      anaList.map((v, i) =>
        `<div class="pred-chip ana"><div class="pc-type">穴予想 ${['①','②','③','④','⑤'][i]||i+1}</div><div class="pc-val">${v}</div><div class="pc-note">${i===0?'★本線穴':i===1?'穴対抗':'穴押さえ'}</div>${chipOdds(v)}</div>`
      ).join('');

    document.getElementById('effCards').innerHTML = `
      <div class="eff-card"><div class="eff-icon">💨</div><div class="eff-lbl">風況影響</div><div class="eff-text">${r.wind_effect}</div></div>
      <div class="eff-card"><div class="eff-icon">🌊</div><div class="eff-lbl">潮位影響</div><div class="eff-text">${r.tide_effect}</div></div>
      <div class="eff-card"><div class="eff-icon">⚙️</div><div class="eff-lbl">モーター</div><div class="eff-text">${r.motor_comment}</div></div>`;

    predCards.style.display = 'block';
  } catch (e) {
    aiText.className = 'ai-text';
    aiText.textContent = `予想生成エラー: ${e.message}`;
  }
  btn.disabled = false;
  btn.innerHTML = '⚡ AI予想を生成';
}

/* ======================== PAGE SWITCH ======================== */
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if (name === 'predict') buildOddsPanel();
}

/* ======================== CLOCK ======================== */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getHours(), n.getMinutes(), n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
}

/* ======================== INIT ======================== */
(async function init() {
  const now = new Date();
  document.getElementById('dateInput').value =
    `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  loadPrefs();
  buildDememe('dememe1');
  buildDememe('dememe2');
  updateAdvice();
  buildEntryList([]);
  buildStatsList([]);
  updateFixedBar();
  tick();
  setInterval(tick, 1000);

  const ok = await checkServer();
  if (ok) await loadVenues();
  setInterval(checkServer, 30000);
})();
</script>
